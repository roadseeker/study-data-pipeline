networks:
  pipeline-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  # ──────────────────────────────────────
  # PostgreSQL — 메타데이터 저장소
  # ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lab-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./scripts/init-customers.sql:/docker-entrypoint-initdb.d/02-init-customers.sql
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Redis — 피처 스토어 / 캐시
  # ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lab-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────
  # Kafka — KRaft 모드 (Zookeeper 불필요)
  # ──────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: lab-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "29092:29092"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────
  # NiFi — 데이터 수집·라우팅
  # ──────────────────────────────────────
  nifi:
    image: apache/nifi:1.25.0
    container_name: lab-nifi
    environment:
      NIFI_WEB_HTTP_PORT: 8080
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: nifi1234admin
    ports:
      - "8080:8080"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/nifi/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ──────────────────────────────────────
  # Flink — 실시간 스트림 처리
  # ──────────────────────────────────────
  flink-jobmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: lab-flink-jm
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    ports:
      - "8081:8081"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    image: flink:1.18.1-scala_2.12-java11
    container_name: lab-flink-tm
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    networks:
      - pipeline-net

  # ──────────────────────────────────────
  # Spark — 배치 처리
  # ──────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: lab-spark-master
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    volumes:
      - ./spark-etl:/opt/spark-etl
      - ./spark-jobs:/opt/spark-jobs
      - ./data:/data
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  spark-worker:
    image: bitnami/spark:3.5.1
    container_name: lab-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark-etl:/opt/spark-etl
      - ./spark-jobs:/opt/spark-jobs
      - ./data:/data
    networks:
      - pipeline-net

  # ──────────────────────────────────────
  # Airflow — 오케스트레이션
  # ──────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.4-python3.11
    container_name: lab-airflow-init
    entrypoint: >
      bash -c "
        airflow db init &&
        airflow users create \
          --username admin \
          --password admin1234 \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@pipeline-lab.local
      "
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline-net

  airflow-webserver:
    image: apache/airflow:2.8.4-python3.11
    container_name: lab-airflow-web
    command: airflow webserver --port 8083
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      _PIP_ADDITIONAL_REQUIREMENTS: "redis confluent-kafka"
    ports:
      - "8083:8083"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 30s

  airflow-scheduler:
    image: apache/airflow:2.8.4-python3.11
    container_name: lab-airflow-sched
    command: airflow scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      _PIP_ADDITIONAL_REQUIREMENTS: "redis confluent-kafka"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pipeline-net
